<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>แบบทดสอบ ML พื้นฐาน</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c0f;
    --surface: #111318;
    --surface2: #181c23;
    --border: #252a35;
    --accent: #4fffb0;
    --accent2: #ff6b6b;
    --accent3: #ffd166;
    --text: #e8eaf0;
    --text-muted: #7a8099;
    --text-dim: #3d4358;
    --correct: #4fffb0;
    --wrong: #ff6b6b;
    --radius: 14px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Sarabun', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.3;
    z-index: 0;
    pointer-events: none;
  }

  #app { position: relative; z-index: 1; min-height: 100vh; }

  /* ========== HOME ========== */
  #home { max-width: 680px; margin: 0 auto; padding: 40px 20px 80px; }

  .home-header { text-align: center; margin-bottom: 48px; }

  .home-badge {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 5px 14px;
    border-radius: 100px;
    margin-bottom: 20px;
  }

  .home-title {
    font-family: 'Syne', sans-serif;
    font-size: clamp(28px, 7vw, 52px);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -1px;
    margin-bottom: 8px;
  }

  .home-title span {
    color: var(--accent);
    display: block;
    font-family: 'Sarabun', sans-serif;
    font-size: clamp(22px, 5vw, 36px);
    font-weight: 700;
    letter-spacing: 0;
  }

  .home-sub {
    font-family: 'Sarabun', sans-serif;
    font-size: 15px;
    color: var(--text-muted);
    margin-top: 14px;
  }

  .total-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 6px 16px;
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 12px;
  }

  .total-badge strong { color: var(--accent); }

  .topic-grid { display: flex; flex-direction: column; gap: 10px; }

  .topic-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    -webkit-tap-highlight-color: transparent;
  }

  .topic-card:hover, .topic-card:active {
    border-color: var(--accent);
    background: var(--surface2);
    transform: translateX(4px);
  }

  .topic-card.completed { border-color: rgba(79,255,176,0.35); }

  .topic-left { display: flex; align-items: center; gap: 14px; flex: 1; min-width: 0; }

  .topic-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    min-width: 26px;
    flex-shrink: 0;
  }

  .topic-info { min-width: 0; }

  .topic-name {
    font-family: 'Sarabun', sans-serif;
    font-size: 15px;
    font-weight: 600;
    line-height: 1.4;
  }

  .topic-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .topic-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

  .topic-score {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--accent);
  }

  .topic-arrow { color: var(--text-dim); font-size: 18px; transition: color 0.2s; }
  .topic-card:hover .topic-arrow { color: var(--accent); }

  /* ========== QUIZ ========== */
  #quiz { display: none; }

  .quiz-header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: rgba(10,12,15,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
  }

  .quiz-header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .back-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: 'Sarabun', sans-serif;
    font-size: 13px;
    padding: 7px 14px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  .back-btn:hover { border-color: var(--text-muted); color: var(--text); }

  .quiz-topic-label {
    font-family: 'Sarabun', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    text-align: right;
    max-width: 180px;
    line-height: 1.3;
  }

  .progress-row { display: flex; align-items: center; gap: 12px; }

  .progress-bar {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #00e5ff);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .progress-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    min-width: 50px;
    text-align: right;
  }

  /* ========== QUESTION ========== */
  .quiz-body { max-width: 680px; margin: 0 auto; padding: 28px 20px 80px; }

  .question-card { animation: fadeUp 0.3s ease; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .question-number {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .question-text {
    font-size: 18px;
    line-height: 1.7;
    margin-bottom: 24px;
    font-weight: 500;
  }

  .question-text code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 2px 7px;
    border-radius: 4px;
    color: var(--accent3);
  }

  .options { display: flex; flex-direction: column; gap: 10px; }

  .option-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 15px 18px;
    cursor: pointer;
    text-align: left;
    font-family: 'Sarabun', sans-serif;
    font-size: 16px;
    color: var(--text);
    display: flex;
    align-items: flex-start;
    gap: 12px;
    transition: all 0.15s ease;
    -webkit-tap-highlight-color: transparent;
    line-height: 1.55;
  }

  .option-btn:hover:not(:disabled) {
    border-color: rgba(79,255,176,0.5);
    background: var(--surface2);
  }

  .option-key {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 2px 7px;
    min-width: 28px;
    text-align: center;
    flex-shrink: 0;
    margin-top: 3px;
    transition: all 0.15s;
  }

  .option-btn:disabled { cursor: default; }

  .option-btn.correct {
    border-color: var(--correct);
    background: rgba(79,255,176,0.08);
  }
  .option-btn.correct .option-key {
    background: var(--correct);
    border-color: var(--correct);
    color: #000;
    font-weight: 700;
  }

  .option-btn.wrong {
    border-color: var(--wrong);
    background: rgba(255,107,107,0.08);
  }
  .option-btn.wrong .option-key {
    background: var(--wrong);
    border-color: var(--wrong);
    color: #fff;
    font-weight: 700;
  }

  .explanation {
    margin-top: 18px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: var(--radius);
    padding: 16px 18px;
    font-size: 15px;
    line-height: 1.75;
    color: var(--text-muted);
    animation: fadeUp 0.3s ease;
  }

  .explanation strong {
    color: var(--text);
    font-family: 'Sarabun', sans-serif;
    font-size: 14px;
    font-weight: 700;
    display: block;
    margin-bottom: 6px;
  }

  .next-btn {
    margin-top: 20px;
    width: 100%;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: var(--radius);
    padding: 16px;
    font-family: 'Sarabun', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
    -webkit-tap-highlight-color: transparent;
    display: none;
  }

  .next-btn:hover { opacity: 0.85; }
  .next-btn:active { opacity: 0.7; }

  /* ========== RESULT ========== */
  #result { display: none; }

  .result-wrap {
    max-width: 480px;
    margin: 0 auto;
    padding: 56px 20px;
    text-align: center;
  }

  .result-score-ring {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: 3px solid var(--border);
    margin: 0 auto 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    background: var(--surface);
  }

  .result-score-ring::before {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    border: 3px solid transparent;
    border-top-color: var(--accent);
    border-right-color: var(--accent);
    animation: spin 2s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .result-pct {
    font-family: 'Syne', sans-serif;
    font-size: 38px;
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
  }

  .result-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .grade-badge {
    display: inline-block;
    font-family: 'Sarabun', sans-serif;
    font-size: 13px;
    font-weight: 700;
    padding: 5px 14px;
    border-radius: 100px;
    margin-bottom: 16px;
  }

  .grade-s { background: rgba(79,255,176,0.15); color: var(--correct); border: 1px solid var(--correct); }
  .grade-a { background: rgba(79,255,176,0.08); color: #a0f0c0; border: 1px solid rgba(79,255,176,0.35); }
  .grade-b { background: rgba(255,209,102,0.1); color: var(--accent3); border: 1px solid rgba(255,209,102,0.35); }
  .grade-c { background: rgba(255,107,107,0.1); color: var(--wrong); border: 1px solid rgba(255,107,107,0.35); }

  .result-title {
    font-family: 'Sarabun', sans-serif;
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .result-sub {
    font-size: 15px;
    color: var(--text-muted);
    line-height: 1.7;
    margin-bottom: 28px;
  }

  .result-stats {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }

  .stat-chip {
    font-family: 'Sarabun', sans-serif;
    font-size: 14px;
    padding: 8px 18px;
    border-radius: 100px;
    border: 1px solid var(--border);
  }

  .stat-chip.c { border-color: var(--correct); color: var(--correct); }
  .stat-chip.w { border-color: var(--wrong); color: var(--wrong); }

  .result-btns { display: flex; flex-direction: column; gap: 10px; }

  .btn-primary {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: var(--radius);
    padding: 15px;
    font-family: 'Sarabun', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-primary:hover { opacity: 0.85; }

  .btn-secondary {
    background: none;
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    font-family: 'Sarabun', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-secondary:hover { border-color: var(--text-muted); color: var(--text); }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 400px) {
    .question-text { font-size: 16px; }
    .option-btn { font-size: 15px; padding: 13px 15px; }
  }
</style>
</head>
<body>
<div id="app">

<!-- HOME -->
<div id="home">
  <div class="home-header">
    <div class="home-badge">Machine Learning · Fundamentals</div>
    <h1 class="home-title">แบบทดสอบ<span>พื้นฐาน Machine Learning</span></h1>
    <p class="home-sub">เลือกหัวข้อที่ต้องการทดสอบความเข้าใจ</p>
    <div class="total-badge">รวมทั้งหมด <strong id="totalQ">0</strong> ข้อ ใน 9 หัวข้อ</div>
  </div>
  <div class="topic-grid" id="topicGrid"></div>
</div>

<!-- QUIZ -->
<div id="quiz">
  <div class="quiz-header">
    <div class="quiz-header-top">
      <button class="back-btn" onclick="goHome()">← กลับ</button>
      <div class="quiz-topic-label" id="quizTopicLabel"></div>
    </div>
    <div class="progress-row">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-label" id="progressLabel"></div>
    </div>
  </div>
  <div class="quiz-body">
    <div class="question-card" id="questionCard"></div>
  </div>
</div>

<!-- RESULT -->
<div id="result">
  <div class="result-wrap">
    <div class="result-score-ring">
      <div class="result-pct" id="resultPct"></div>
      <div class="result-label">คะแนน</div>
    </div>
    <div class="grade-badge" id="gradeBadge"></div>
    <h2 class="result-title" id="resultTitle"></h2>
    <p class="result-sub" id="resultSub"></p>
    <div class="result-stats">
      <div class="stat-chip c" id="correctChip"></div>
      <div class="stat-chip w" id="wrongChip"></div>
    </div>
    <div class="result-btns">
      <button class="btn-primary" id="retryBtn">ทำซ้ำอีกครั้ง</button>
      <button class="btn-secondary" onclick="goHome()">← กลับหน้าหลัก</button>
    </div>
  </div>
</div>

</div>

<script>
const TOPICS = [
  {
    id: 0,
    name: "บทนำสู่ Machine Learning",
    questions: [
      {
        q: "Machine Learning คืออะไร?",
        opts: [
          "การเขียนโปรแกรมให้คอมพิวเตอร์ทำงานทีละขั้นตอนอย่างชัดเจน",
          "ศาสตร์ที่ทำให้ระบบเรียนรู้และพัฒนาตัวเองจากประสบการณ์โดยไม่ต้องโปรแกรมโดยตรง",
          "การใช้สถิติเพื่ออธิบายข้อมูลเท่านั้น",
          "การสร้างระบบผู้เชี่ยวชาญโดยอิงกฎที่กำหนดไว้ล่วงหน้า"
        ],
        ans: 1,
        exp: "Machine Learning (ML) ช่วยให้ระบบสามารถเรียนรู้และปรับปรุงตัวเองจากประสบการณ์ได้โดยอัตโนมัติ (Arthur Samuel, 1959) ต่างจากการโปรแกรมแบบดั้งเดิมที่ต้องเขียนกฎทุกอย่างด้วยมือ ML ค้นพบรูปแบบจากข้อมูล"
      },
      {
        q: "ประเภทหลักของ Machine Learning มีอะไรบ้าง?",
        opts: [
          "Supervised, Unsupervised, Deterministic Learning",
          "Supervised, Unsupervised, Reinforcement Learning",
          "Classification, Regression, Clustering",
          "Parametric, Non-Parametric, Deep Learning"
        ],
        ans: 1,
        exp: "ML แบ่งเป็น 3 ประเภทหลัก: (1) Supervised Learning — เรียนรู้จากข้อมูลที่มี label (2) Unsupervised Learning — หารูปแบบจากข้อมูลไม่มี label (3) Reinforcement Learning — เรียนรู้จากรางวัลและบทลงโทษจากสิ่งแวดล้อม"
      },
      {
        q: "ใน Supervised Learning ข้อมูล Training ประกอบด้วยอะไร?",
        opts: [
          "เฉพาะ input features ไม่มี label",
          "คู่ของ input features และ output label ที่รู้ค่าแล้ว",
          "รางวัลและบทลงโทษจากสิ่งแวดล้อม",
          "กลุ่มข้อมูลที่มีความคล้ายกัน"
        ],
        ans: 1,
        exp: "Supervised Learning ใช้ข้อมูล labeled: คู่ (x⁽ⁱ⁾, y⁽ⁱ⁾) โดย x คือ input และ y คือ output ที่รู้ค่า (label) แล้ว โมเดลจะเรียนรู้การ mapping จาก input ไปยัง output"
      },
      {
        q: "Overfitting คืออะไร?",
        opts: [
          "โมเดลเรียบง่ายเกินไปจนจับรูปแบบไม่ได้",
          "โมเดล fit กับข้อมูล training ดีมากเกินไปจนไม่สามารถ generalize ได้",
          "ข้อมูล training มีขนาดใหญ่เกินไป",
          "Learning rate ต่ำเกินไป"
        ],
        ans: 1,
        exp: "Overfitting: โมเดล 'จำ' ข้อมูล training (training error ต่ำ) แต่จับ noise แทนที่จะจับ signal จริง ทำให้ test error สูง มีลักษณะ high variance — โมเดลซับซ้อนเกินไปสำหรับข้อมูล"
      },
      {
        q: "Underfitting มีลักษณะอย่างไร?",
        opts: [
          "Training accuracy สูง แต่ Test accuracy ต่ำ",
          "High Bias — โมเดลเรียบง่ายเกินไปจนจับ signal ไม่ได้",
          "Variance สูงในการทำนาย",
          "มี parameter มากเกินไป"
        ],
        ans: 1,
        exp: "Underfitting = high bias โมเดลง่ายเกินไป (เช่น fit เส้นตรงกับข้อมูลที่โค้ง) ทั้ง training error และ test error สูง เพราะจับ pattern พื้นฐานไม่ได้"
      },
      {
        q: "Bias-Variance Tradeoff กล่าวว่าอย่างไร?",
        opts: [
          "เพิ่มความซับซ้อนของโมเดลเสมอทำให้ดีขึ้น",
          "การลด Bias จะลด Variance เสมอ",
          "เมื่อความซับซ้อนของโมเดลเพิ่มขึ้น Bias ลดลงแต่ Variance เพิ่มขึ้น",
          "Bias และ Variance ไม่เกี่ยวกับความซับซ้อนของโมเดล"
        ],
        ans: 2,
        exp: "Total Error = Bias² + Variance + Irreducible Noise โมเดลซับซ้อน (parameter มาก) = bias ต่ำ แต่ variance สูง โมเดลง่าย = bias สูง แต่ variance ต่ำ ต้องหา 'จุดสมดุล' ที่ total error ต่ำสุด"
      },
      {
        q: "K-fold Cross-Validation ทำงานอย่างไร?",
        opts: [
          "Train โมเดล k ครั้งด้วย random seed ต่างกัน",

let currentTopic = null;
let currentQuestions = [];
let currentIdx = 0;
let score = 0;
let answered = false;
let scores = {};

document.getElementById('totalQ').textContent = TOPICS.reduce((s,t)=>s+t.questions.length,0);

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function renderHome() {
  const grid = document.getElementById('topicGrid');
  grid.innerHTML = '';
  TOPICS.forEach((topic, i) => {
    const sc = scores[topic.id];
    const card = document.createElement('div');
    card.className = 'topic-card' + (sc !== undefined ? ' completed' : '');
    card.innerHTML = `
      <div class="topic-left">
        <div class="topic-num">${String(i+1).padStart(2,'0')}</div>
        <div class="topic-info">
          <div class="topic-name">${topic.name}</div>
          <div class="topic-meta">${topic.questions.length} ข้อ</div>
        </div>
      </div>
      <div class="topic-right">
        ${sc !== undefined ? `<div class="topic-score">${sc}/${topic.questions.length}</div>` : ''}
        <div class="topic-arrow">›</div>
      </div>
    `;
    card.onclick = () => startQuiz(topic.id);
    grid.appendChild(card);
  });
}

function startQuiz(topicId) {
  currentTopic = TOPICS[topicId];
  currentQuestions = shuffle(currentTopic.questions);
  currentIdx = 0;
  score = 0;
  answered = false;
  document.getElementById('home').style.display = 'none';
  document.getElementById('result').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  document.getElementById('quizTopicLabel').textContent = currentTopic.name;
  renderQuestion();
  window.scrollTo({top:0});
}

function renderQuestion() {
  answered = false;
  const q = currentQuestions[currentIdx];
  const total = currentQuestions.length;
  const pct = (currentIdx / total) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${currentIdx+1} / ${total}`;

  const keys = ['ก','ข','ค','ง'];
  const card = document.getElementById('questionCard');

  let optsHtml = q.opts.map((opt, i) => `
    <button class="option-btn" onclick="selectAnswer(${i})" id="opt-${i}">
      <span class="option-key">${keys[i]}</span>
      <span>${opt}</span>
    </button>
  `).join('');

  card.innerHTML = `
    <div class="question-number">ข้อที่ ${currentIdx+1} จาก ${total}</div>
    <div class="question-text">${q.q}</div>
    <div class="options">${optsHtml}</div>
    <div id="explanation"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">
      ${currentIdx+1 < total ? 'ข้อถัดไป →' : 'ดูผลคะแนน →'}
    </button>
  `;
}

function selectAnswer(selected) {
  if (answered) return;
  answered = true;
  const q = currentQuestions[currentIdx];
  const isCorrect = selected === q.ans;
  if (isCorrect) score++;

  document.querySelectorAll('.option-btn').forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.ans) btn.classList.add('correct');
    else if (i === selected && !isCorrect) btn.classList.add('wrong');
  });

  const exp = document.getElementById('explanation');
  exp.innerHTML = `<div class="explanation"><strong>${isCorrect ? '✓ ถูกต้อง!' : '✗ ไม่ถูกต้อง'}</strong>${q.exp}</div>`;

  document.getElementById('nextBtn').style.display = 'block';
}

function nextQuestion() {
  currentIdx++;
  if (currentIdx >= currentQuestions.length) {
    showResult();
  } else {
    renderQuestion();
    window.scrollTo({top: 0, behavior: 'smooth'});
  }
}

function showResult() {
  scores[currentTopic.id] = score;
  const total = currentQuestions.length;
  const pct = Math.round((score / total) * 100);

  document.getElementById('quiz').style.display = 'none';
  document.getElementById('result').style.display = 'block';
  document.getElementById('resultPct').textContent = pct + '%';

  let grade, gradeCls, title, sub;
  if (pct >= 90) { grade = 'ระดับดีเยี่ยม'; gradeCls = 'grade-s'; title = 'ยอดเยี่ยมมาก!'; sub = 'คุณเข้าใจหัวข้อนี้อย่างลึกซึ้ง ทำต่อไปได้เลย!'; }
  else if (pct >= 75) { grade = 'ระดับดีมาก'; gradeCls = 'grade-a'; title = 'ทำได้ดีมาก!'; sub = 'ผลลัพธ์ดี ลองทบทวนข้อที่ตอบผิดเพื่อเสริมความเข้าใจ'; }
  else if (pct >= 55) { grade = 'ระดับดี'; gradeCls = 'grade-b'; title = 'ผ่านได้!'; sub = 'พื้นฐานดี แต่ควรทบทวนเนื้อหาและอ่านคำอธิบายอีกครั้ง'; }
  else { grade = 'ต้องทบทวนเพิ่ม'; gradeCls = 'grade-c'; title = 'ฝึกฝนต่อไปนะ!'; sub = 'กลับไปทบทวนเนื้อหาและลองทำใหม่อีกครั้ง อ่านคำอธิบายแต่ละข้ออย่างละเอียด'; }

  document.getElementById('gradeBadge').textContent = grade;
  document.getElementById('gradeBadge').className = 'grade-badge ' + gradeCls;
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultSub').textContent = sub;
  document.getElementById('correctChip').textContent = `✓ ถูก ${score} ข้อ`;
  document.getElementById('wrongChip').textContent = `✗ ผิด ${total - score} ข้อ`;
  document.getElementById('retryBtn').onclick = () => startQuiz(currentTopic.id);
  window.scrollTo({top:0, behavior:'smooth'});
}

function goHome() {
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('result').style.display = 'none';
  document.getElementById('home').style.display = 'block';
  renderHome();
  window.scrollTo({top:0, behavior:'smooth'});
}

renderHome();
</script>
</body>
</html>
