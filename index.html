<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ML Fundamentals Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c0f;
    --surface: #111318;
    --surface2: #181c23;
    --border: #252a35;
    --accent: #4fffb0;
    --accent2: #ff6b6b;
    --accent3: #ffd166;
    --text: #e8eaf0;
    --text-muted: #7a8099;
    --text-dim: #3d4358;
    --correct: #4fffb0;
    --wrong: #ff6b6b;
    --radius: 14px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Lora', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.3;
    z-index: 0;
    pointer-events: none;
  }

  #app {
    position: relative;
    z-index: 1;
    min-height: 100vh;
  }

  /* ========== HOME ========== */
  #home {
    max-width: 680px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  .home-header {
    text-align: center;
    margin-bottom: 48px;
  }

  .home-badge {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 5px 14px;
    border-radius: 100px;
    margin-bottom: 20px;
  }

  .home-title {
    font-family: 'Syne', sans-serif;
    font-size: clamp(32px, 8vw, 56px);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -1px;
    margin-bottom: 12px;
  }

  .home-title span {
    color: var(--accent);
    display: block;
  }

  .home-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 16px;
  }

  .topic-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .topic-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    -webkit-tap-highlight-color: transparent;
  }

  .topic-card:hover, .topic-card:active {
    border-color: var(--accent);
    background: var(--surface2);
    transform: translateX(4px);
  }

  .topic-card.completed {
    border-color: rgba(79,255,176,0.3);
  }

  .topic-left {
    display: flex;
    align-items: center;
    gap: 16px;
    flex: 1;
    min-width: 0;
  }

  .topic-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    min-width: 28px;
    flex-shrink: 0;
  }

  .topic-info { min-width: 0; }

  .topic-name {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .topic-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 3px;
  }

  .topic-score {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    flex-shrink: 0;
  }

  .topic-arrow {
    color: var(--text-dim);
    font-size: 18px;
    flex-shrink: 0;
    transition: color 0.2s;
  }

  .topic-card:hover .topic-arrow { color: var(--accent); }

  /* ========== QUIZ ========== */
  #quiz { display: none; }

  .quiz-header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: rgba(10,12,15,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
  }

  .quiz-header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .back-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 7px 14px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  .back-btn:hover { border-color: var(--text-muted); color: var(--text); }

  .quiz-topic-label {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    text-align: right;
    max-width: 160px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .progress-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .progress-bar {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #00e5ff);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .progress-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    min-width: 50px;
    text-align: right;
  }

  .quiz-body {
    max-width: 680px;
    margin: 0 auto;
    padding: 32px 20px 80px;
  }

  .question-card {
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .question-number {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .question-text {
    font-size: 18px;
    line-height: 1.6;
    margin-bottom: 28px;
    font-weight: 400;
  }

  .question-text code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 2px 7px;
    border-radius: 4px;
    color: var(--accent3);
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    cursor: pointer;
    text-align: left;
    font-family: 'Lora', serif;
    font-size: 15px;
    color: var(--text);
    display: flex;
    align-items: flex-start;
    gap: 14px;
    transition: all 0.15s ease;
    -webkit-tap-highlight-color: transparent;
    line-height: 1.5;
  }

  .option-btn:hover:not(:disabled) {
    border-color: rgba(79,255,176,0.5);
    background: var(--surface2);
  }

  .option-key {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 2px 8px;
    min-width: 30px;
    text-align: center;
    flex-shrink: 0;
    margin-top: 2px;
    transition: all 0.15s;
  }

  .option-btn:disabled { cursor: default; }

  .option-btn.correct {
    border-color: var(--correct);
    background: rgba(79,255,176,0.08);
  }

  .option-btn.correct .option-key {
    background: var(--correct);
    border-color: var(--correct);
    color: #000;
    font-weight: 700;
  }

  .option-btn.wrong {
    border-color: var(--wrong);
    background: rgba(255,107,107,0.08);
  }

  .option-btn.wrong .option-key {
    background: var(--wrong);
    border-color: var(--wrong);
    color: #fff;
    font-weight: 700;
  }

  .explanation {
    margin-top: 20px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: var(--radius);
    padding: 16px 20px;
    font-size: 14px;
    line-height: 1.7;
    color: var(--text-muted);
    animation: fadeUp 0.3s ease;
  }

  .explanation strong {
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    display: block;
    margin-bottom: 6px;
  }

  .next-btn {
    margin-top: 24px;
    width: 100%;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: var(--radius);
    padding: 16px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
    -webkit-tap-highlight-color: transparent;
    display: none;
    letter-spacing: 0.5px;
  }

  .next-btn:hover { opacity: 0.85; }
  .next-btn:active { opacity: 0.7; }

  /* ========== RESULT ========== */
  #result { display: none; }

  .result-wrap {
    max-width: 500px;
    margin: 0 auto;
    padding: 60px 20px;
    text-align: center;
  }

  .result-score-ring {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: 3px solid var(--border);
    margin: 0 auto 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    background: var(--surface);
  }

  .result-score-ring::before {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    border: 3px solid transparent;
    border-top-color: var(--accent);
    border-right-color: var(--accent);
  }

  .result-pct {
    font-family: 'Syne', sans-serif;
    font-size: 40px;
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
  }

  .result-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .result-title {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .result-sub {
    font-size: 15px;
    color: var(--text-muted);
    line-height: 1.6;
    margin-bottom: 32px;
  }

  .result-stats {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 36px;
    flex-wrap: wrap;
  }

  .stat-chip {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    padding: 8px 16px;
    border-radius: 100px;
    border: 1px solid var(--border);
  }

  .stat-chip.c { border-color: var(--correct); color: var(--correct); }
  .stat-chip.w { border-color: var(--wrong); color: var(--wrong); }

  .result-btns {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .btn-primary {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: var(--radius);
    padding: 15px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-primary:hover { opacity: 0.85; }

  .btn-secondary {
    background: none;
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-secondary:hover { border-color: var(--text-muted); color: var(--text); }

  .grade-badge {
    display: inline-block;
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 100px;
    margin-bottom: 20px;
  }

  .grade-s { background: rgba(79,255,176,0.15); color: var(--correct); border: 1px solid var(--correct); }
  .grade-a { background: rgba(79,255,176,0.1); color: #a0f0c0; border: 1px solid rgba(79,255,176,0.4); }
  .grade-b { background: rgba(255,209,102,0.1); color: var(--accent3); border: 1px solid rgba(255,209,102,0.4); }
  .grade-c { background: rgba(255,107,107,0.1); color: var(--wrong); border: 1px solid rgba(255,107,107,0.4); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Responsive tweaks */
  @media (max-width: 400px) {
    .question-text { font-size: 16px; }
    .option-btn { font-size: 14px; padding: 14px 16px; }
  }
</style>
</head>
<body>
<div id="app">

<!-- HOME -->
<div id="home">
  <div class="home-header">
    <div class="home-badge">CS 229 · Stanford</div>
    <h1 class="home-title">Fundamentals of<span>Machine Learning</span></h1>
    <p class="home-sub">เลือกหัวข้อเพื่อเริ่มทำแบบทดสอบ</p>
  </div>
  <div class="topic-grid" id="topicGrid"></div>
</div>

<!-- QUIZ -->
<div id="quiz">
  <div class="quiz-header">
    <div class="quiz-header-top">
      <button class="back-btn" onclick="goHome()">← Back</button>
      <div class="quiz-topic-label" id="quizTopicLabel"></div>
    </div>
    <div class="progress-row">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-label" id="progressLabel"></div>
    </div>
  </div>
  <div class="quiz-body">
    <div class="question-card" id="questionCard"></div>
  </div>
</div>

<!-- RESULT -->
<div id="result">
  <div class="result-wrap">
    <div class="result-score-ring">
      <div class="result-pct" id="resultPct"></div>
      <div class="result-label">score</div>
    </div>
    <div class="grade-badge" id="gradeBadge"></div>
    <h2 class="result-title" id="resultTitle"></h2>
    <p class="result-sub" id="resultSub"></p>
    <div class="result-stats">
      <div class="stat-chip c" id="correctChip"></div>
      <div class="stat-chip w" id="wrongChip"></div>
    </div>
    <div class="result-btns">
      <button class="btn-primary" id="retryBtn">ทำซ้ำ</button>
      <button class="btn-secondary" onclick="goHome()">← กลับหน้าหลัก</button>
    </div>
  </div>
</div>

</div>

<script>
const TOPICS = [
  {
    id: 0,
    name: "Introduction to Machine Learning",
    questions: [
      {
        q: "Machine Learning is best defined as:",
        opts: [
          "Explicitly programming a computer to perform tasks",
          "A field where systems learn and improve from experience without being explicitly programmed",
          "Using statistics to describe data",
          "Building rule-based expert systems"
        ],
        ans: 1,
        exp: "ML enables systems to automatically learn and improve from experience (Arthur Samuel, 1959). Unlike traditional programming, ML discovers patterns from data rather than following hand-coded rules."
      },
      {
        q: "Which of the following is NOT a major category of machine learning?",
        opts: [
          "Supervised Learning",
          "Unsupervised Learning",
          "Deterministic Learning",
          "Reinforcement Learning"
        ],
        ans: 2,
        exp: "The three major paradigms are Supervised, Unsupervised, and Reinforcement Learning. 'Deterministic Learning' is not a recognized category."
      },
      {
        q: "In supervised learning, the training data consists of:",
        opts: [
          "Only input features with no labels",
          "Pairs of input features and corresponding output labels",
          "Rewards and penalties from an environment",
          "Clusters of similar data points"
        ],
        ans: 1,
        exp: "Supervised learning uses labeled training data: (x⁽ⁱ⁾, y⁽ⁱ⁾) pairs, where x is the input and y is the known output (label). The model learns a mapping from inputs to outputs."
      },
      {
        q: "The difference between a training error and a generalization (test) error is that:",
        opts: [
          "Training error is always higher than test error",
          "Test error measures performance on unseen data; training error measures performance on data the model trained on",
          "They measure different metrics",
          "Training error is computed after deployment"
        ],
        ans: 1,
        exp: "Training error (empirical risk) measures how well the model fits the training set. Generalization error measures how well it performs on new, unseen data — which is what we actually care about."
      },
      {
        q: "Overfitting occurs when:",
        opts: [
          "The model is too simple to capture underlying patterns",
          "The model fits the training data too well and fails to generalize",
          "The training set is too large",
          "The learning rate is too small"
        ],
        ans: 1,
        exp: "Overfitting: the model memorizes training data (low training error) but captures noise rather than the true signal, leading to high test error. It has high variance."
      },
      {
        q: "Underfitting is characterized by:",
        opts: [
          "High training accuracy and low test accuracy",
          "High bias — the model is too simple to capture the signal",
          "High variance in predictions",
          "Too many parameters"
        ],
        ans: 1,
        exp: "Underfitting = high bias. The model is too simple (e.g., fitting a line to quadratic data). Both training and test errors are high because it fails to capture the underlying pattern."
      },
      {
        q: "The bias-variance tradeoff states that:",
        opts: [
          "Increasing model complexity always improves performance",
          "Reducing bias always reduces variance",
          "As model complexity increases, bias decreases but variance increases",
          "Bias and variance are independent of model complexity"
        ],
        ans: 2,
        exp: "Total error = Bias² + Variance + Irreducible Noise. Complex models (more parameters) have low bias but high variance. Simple models have high bias but low variance. Optimal complexity minimizes total error."
      },
      {
        q: "K-fold cross-validation works by:",
        opts: [
          "Training the model k times with different random seeds",
          "Partitioning data into k folds, training on k-1 folds and validating on the remaining fold, rotating k times",
          "Using k different model architectures",
          "Splitting data into k equal training sets"
        ],
        ans: 1,
        exp: "K-fold CV: split data into k equal parts. In each of k rounds, train on (k-1) folds and evaluate on 1 fold. Average the k validation scores. This gives a robust estimate of generalization performance."
      },
      {
        q: "Which metric is most appropriate for evaluating a binary classifier on a severely imbalanced dataset (e.g., 1% positive class)?",
        opts: [
          "Accuracy",
          "F1-score or AUC-ROC",
          "Mean Squared Error",
          "R² score"
        ],
        ans: 1,
        exp: "With class imbalance, accuracy is misleading (predicting all negatives gives 99% accuracy). F1-score balances precision and recall; AUC-ROC measures separability across thresholds."
      },
      {
        q: "In the context of ML, a 'feature' refers to:",
        opts: [
          "The output label y",
          "An individual measurable property or characteristic of a data point",
          "The model's weights",
          "A training example"
        ],
        ans: 1,
        exp: "Features (also called input variables or predictors) are the measurable properties used as inputs to the model. In a housing price prediction task, features might include square footage, number of rooms, location, etc."
      },
      {
        q: "Regularization is used to:",
        opts: [
          "Speed up training",
          "Increase model complexity",
          "Prevent overfitting by penalizing model complexity",
          "Normalize the input features"
        ],
        ans: 2,
        exp: "Regularization adds a penalty term to the loss function (e.g., L1 or L2 norm of weights). This discourages the model from assigning large weights, reducing overfitting and improving generalization."
      }
    ]
  },
  {
    id: 1,
    name: "Supervised Learning — Generative Models",
    questions: [
      {
        q: "A generative model learns:",
        opts: [
          "The decision boundary P(y|x) directly",
          "The joint distribution P(x, y) or the class-conditional P(x|y)",
          "A discriminant function without probabilistic interpretation",
          "Only the marginal distribution P(x)"
        ],
        ans: 1,
        exp: "Generative models model how the data was generated: P(x, y) = P(x|y) · P(y). They can generate new samples. Examples: Naive Bayes, GDA. Discriminative models learn P(y|x) directly."
      },
      {
        q: "The Naive Bayes classifier assumes:",
        opts: [
          "Features are correlated given the class label",
          "Features are conditionally independent given the class label",
          "The decision boundary is linear",
          "Data follows a Gaussian distribution"
        ],
        ans: 1,
        exp: "Naive Bayes 'naive' assumption: P(x₁, x₂, ..., xₙ | y) = ∏ P(xᵢ | y). Features are conditionally independent given the class. Despite being often violated in practice, it works remarkably well."
      },
      {
        q: "Using Bayes' theorem, a generative classifier computes:",
        opts: [
          "P(y|x) ∝ P(x|y) · P(y)",
          "P(y|x) = P(y) / P(x)",
          "P(y|x) = P(x|y) - P(y)",
          "P(y|x) = P(x) · P(y)"
        ],
        ans: 0,
        exp: "Bayes' theorem: P(y|x) = P(x|y)·P(y) / P(x). Since P(x) is constant across classes, we classify by argmax_y P(x|y)·P(y). P(y) is the class prior; P(x|y) is the likelihood."
      },
      {
        q: "Gaussian Discriminant Analysis (GDA) models P(x|y) as:",
        opts: [
          "A uniform distribution",
          "A multinomial distribution",
          "A multivariate Gaussian distribution",
          "A Bernoulli distribution"
        ],
        ans: 2,
        exp: "GDA assumes P(x|y=0) ~ N(μ₀, Σ) and P(x|y=1) ~ N(μ₁, Σ). The features given the class are multivariate Gaussian with class-specific means but a shared covariance matrix."
      },
      {
        q: "In GDA, if both classes share the same covariance matrix Σ, the resulting decision boundary is:",
        opts: [
          "Quadratic",
          "Linear",
          "Non-parametric",
          "Circular"
        ],
        ans: 1,
        exp: "Shared covariance → linear decision boundary. If covariance matrices differ per class (QDA), the boundary is quadratic. The linear boundary arises because the quadratic terms cancel when Σ₀ = Σ₁."
      },
      {
        q: "For text classification using Naive Bayes, which distribution models P(word | class)?",
        opts: [
          "Gaussian",
          "Multinomial",
          "Poisson",
          "Beta"
        ],
        ans: 1,

// State
let currentTopic = null;
let currentQuestions = [];
let currentIdx = 0;
let score = 0;
let answered = false;
let scores = {};

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function renderHome() {
  const grid = document.getElementById('topicGrid');
  grid.innerHTML = '';
  TOPICS.forEach((topic, i) => {
    const sc = scores[topic.id];
    const card = document.createElement('div');
    card.className = 'topic-card' + (sc !== undefined ? ' completed' : '');
    card.innerHTML = `
      <div class="topic-left">
        <div class="topic-num">${String(i+1).padStart(2,'0')}</div>
        <div class="topic-info">
          <div class="topic-name">${topic.name}</div>
          <div class="topic-meta">${topic.questions.length} questions</div>
        </div>
      </div>
      ${sc !== undefined ? `<div class="topic-score">${sc}/${topic.questions.length}</div>` : ''}
      <div class="topic-arrow">›</div>
    `;
    card.onclick = () => startQuiz(topic.id);
    grid.appendChild(card);
  });
}

function startQuiz(topicId) {
  currentTopic = TOPICS[topicId];
  currentQuestions = shuffle(currentTopic.questions);
  currentIdx = 0;
  score = 0;
  answered = false;

  document.getElementById('home').style.display = 'none';
  document.getElementById('result').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  document.getElementById('quizTopicLabel').textContent = currentTopic.name;
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  const q = currentQuestions[currentIdx];
  const total = currentQuestions.length;

  // Progress
  const pct = (currentIdx / total) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${currentIdx + 1} / ${total}`;

  const keys = ['A', 'B', 'C', 'D'];
  const card = document.getElementById('questionCard');

  let optsHtml = q.opts.map((opt, i) => `
    <button class="option-btn" onclick="selectAnswer(${i})" id="opt-${i}">
      <span class="option-key">${keys[i]}</span>
      <span>${opt}</span>
    </button>
  `).join('');

  card.innerHTML = `
    <div class="question-number">Question ${currentIdx + 1} of ${total}</div>
    <div class="question-text">${q.q}</div>
    <div class="options">${optsHtml}</div>
    <div id="explanation"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">
      ${currentIdx + 1 < total ? 'Next Question →' : 'See Results →'}
    </button>
  `;
}

function selectAnswer(selected) {
  if (answered) return;
  answered = true;

  const q = currentQuestions[currentIdx];
  const isCorrect = selected === q.ans;
  if (isCorrect) score++;

  // Disable all buttons
  document.querySelectorAll('.option-btn').forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.ans) btn.classList.add('correct');
    else if (i === selected && !isCorrect) btn.classList.add('wrong');
  });

  // Show explanation
  const exp = document.getElementById('explanation');
  exp.innerHTML = `<div class="explanation"><strong>${isCorrect ? '✓ Correct!' : '✗ Incorrect'}</strong>${q.exp}</div>`;
  exp.style.display = 'block';

  document.getElementById('nextBtn').style.display = 'block';
}

function nextQuestion() {
  currentIdx++;
  if (currentIdx >= currentQuestions.length) {
    showResult();
  } else {
    renderQuestion();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function showResult() {
  scores[currentTopic.id] = score;
  const total = currentQuestions.length;
  const pct = Math.round((score / total) * 100);

  document.getElementById('quiz').style.display = 'none';
  document.getElementById('result').style.display = 'block';

  document.getElementById('resultPct').textContent = pct + '%';

  let grade, gradeCls, title, sub;
  if (pct >= 90) { grade = 'S'; gradeCls = 'grade-s'; title = 'Excellent!'; sub = 'You have a strong grasp of this topic.'; }
  else if (pct >= 75) { grade = 'A'; gradeCls = 'grade-a'; title = 'Great job!'; sub = 'Well done — review the missed questions to perfect your understanding.'; }
  else if (pct >= 55) { grade = 'B'; gradeCls = 'grade-b'; title = 'Good effort'; sub = 'Solid foundation. Revisit the explanations for the questions you missed.'; }
  else { grade = 'C'; gradeCls = 'grade-c'; title = 'Keep practicing'; sub = 'Review the material and try again. Check the explanations carefully.'; }

  document.getElementById('gradeBadge').textContent = 'Grade ' + grade;
  document.getElementById('gradeBadge').className = 'grade-badge ' + gradeCls;
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultSub').textContent = sub;
  document.getElementById('correctChip').textContent = `✓ ${score} correct`;
  document.getElementById('wrongChip').textContent = `✗ ${total - score} wrong`;

  document.getElementById('retryBtn').onclick = () => startQuiz(currentTopic.id);

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goHome() {
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('result').style.display = 'none';
  document.getElementById('home').style.display = 'block';
  renderHome();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Init
renderHome();
</script>
